# release-plz configuration.
#
# release-plz watches commits on `main`, opens a "chore: release" PR that
# bumps Cargo.toml + Cargo.lock and appends a generated entry to CHANGELOG.md,
# and — when that PR is merged — creates the git tag + GitHub Release.
#
# The tag push then triggers `.github/workflows/release.yml`, which builds the
# prebuilt Linux / macOS / Windows binaries and attaches them to the release
# release-plz just created.
#
# See https://release-plz.ieni.dev/docs/config for all options.

[workspace]
# boincrs is a binary, not a library — we don't publish to crates.io.
publish = false

# release-plz owns the tag and the GitHub Release (notes sourced from
# CHANGELOG.md). The existing release.yml workflow attaches binaries to that
# release rather than creating a new one.
git_tag_enable = true
git_release_enable = true

# Binary crate, no public API to check.
semver_check = false

[changelog]
header = """# Changelog

All notable changes to this project are documented here.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

This file is generated by [release-plz](https://release-plz.ieni.dev/) from
Conventional Commit messages. Do not hand-edit.
"""

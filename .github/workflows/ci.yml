name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Check, test, lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --check

      - name: Build
        run: cargo build --locked

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Tests
        run: cargo test --locked

      - name: Doc tests
        run: cargo test --doc --locked

  host-matrix:
    name: Host matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --locked

      - name: Tests
        run: cargo test --locked

  compatibility-matrix:
    name: BOINC compatibility (${{ matrix.boinc_target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - boinc_target: 7.16
            test_name: boinc_7_16_fixture_compatibility
          - boinc_target: 7.20
            test_name: boinc_7_20_fixture_compatibility
          - boinc_target: 8.2
            test_name: boinc_8_2_fixture_compatibility

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run compatibility fixture
        run: cargo test --locked --test compatibility_matrix_tests ${{ matrix.test_name }}
